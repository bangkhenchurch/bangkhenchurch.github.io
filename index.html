    <title>คริสตจักรแบ๊บติสต์บางเขน</title>
    <style>
        /* รีเซ็ตค่าพื้นฐาน */
        * { box-sizing: border-box; }
        body { 
            background-color: #000; 
            color: #fff; 
            font-family: sans-serif; 
            margin: 0; 
            padding: 0; 
            width: 100%; 
            overflow-x: hidden; /* ป้องกันการเลื่อนซ้ายขวา */
        }

        /* ส่วน Hero: แก้ไขให้พอดีจอ 100% */
        .hero { 
            width: 100%; 
            height: 200px; /* ปรับความสูงตามต้องการ */
            overflow: hidden; 
            display: flex;
            justify-content: center;
            align-items: center;
        }
        .hero img { 
            width: 100%; 
            height: 100%; 
            object-fit: cover; /* บีบรูปให้เต็มพื้นที่โดยไม่เสียสัดส่วน */
            display: block;
        }

        /* ส่วนประกอบอื่นๆ */
        .header { padding: 15px; background: #111; }
        .box { background: #1a1a1a; padding: 15px; margin: 10px; border: 1px solid #333; }
        .footer { padding: 20px; text-align: center; font-size: 12px; }
        img { max-width: 100%; } /* ป้องกันรูปภาพอื่นๆ ล้นจอ */
    </style>
</head>

    </div>
