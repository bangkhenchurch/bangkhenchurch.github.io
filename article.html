<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>รายละเอียดบทความ - Bangkhen Baptist Church</title>
    <link href="https://fonts.googleapis.com/css2?family=Sarabun:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore-compat.js"></script>

    <style>
        :root {
            --bg-color: #121212;
            --card-bg: #1e1e1e;
            --input-bg: #000000;
            --accent-blue: #4da3ff;
            --text-main: #ffffff;
            --text-muted: #b0b0b0;
            --star-gold: #ffcc00;
            --error-red: #ff4d4d;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Sarabun', sans-serif;
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-main);
            padding: 16px;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
        }

        .container {
            width: 100%;
            max-width: 600px;
        }

        .btn-back {
            display: inline-block;
            color: var(--accent-blue);
            text-decoration: none;
            font-size: 14px;
            margin-bottom: 16px;
        }

        .card {
            background-color: var(--card-bg);
            border-radius: 16px;
            padding: 20px;
            box-shadow: 0 4px 20px rgba(0,0,0,0.5);
            margin-bottom: 20px;
        }

        .headline {
            font-size: 24px;
            font-weight: 700;
            line-height: 1.4;
            margin-bottom: 16px;
        }

        .meta-group {
            background-color: rgba(255,255,255,0.04);
            border-left: 4px solid var(--accent-blue);
            border-radius: 6px;
            padding: 14px;
            margin-bottom: 20px;
        }

        .meta-item {
            font-size: 14px;
            margin-bottom: 8px;
            color: var(--text-muted);
            display: flex;
        }

        .meta-item strong {
            color: var(--text-main);
            margin-right: 6px;
            white-space: nowrap;
        }

        .banner-img {
            width: 100%;
            border-radius: 12px;
            margin-bottom: 20px;
            display: none;
            object-fit: cover;
        }

        .content-body {
            font-size: 16px;
            line-height: 1.8;
            color: #e0e0e0;
            white-space: pre-wrap;
            word-break: break-word;
            margin-bottom: 15px;
        }

        .rating-display {
            color: var(--star-gold);
            font-size: 14px;
            margin-bottom: 15px;
        }

        .comment-card {
            border: 1px dashed #333;
        }

        .comment-title {
            font-size: 18px;
            font-weight: 600;
            margin-bottom: 15px;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .form-group {
            margin-bottom: 12px;
        }

        .form-select, .form-input, .form-textarea {
            width: 100%;
            background-color: var(--input-bg);
            border: 1px solid #333;
            border-radius: 8px;
            color: white;
            padding: 12px;
            font-size: 15px;
        }

        .btn-submit {
            width: 100%;
            background-color: #4da3ff;
            color: black;
            font-weight: 600;
            border: none;
            padding: 14px;
            border-radius: 8px;
            font-size: 16px;
            cursor: pointer;
        }

        .status-center {
            text-align: center;
            padding: 30px 10px;
        }

        .status-icon {
            font-size: 48px;
            margin-bottom: 12px;
        }

        .debug-panel {
            background-color: #241414;
            border: 1px solid var(--error-red);
            color: #ffb3b3;
            padding: 10px;
            font-size: 12px;
            border-radius: 6px;
            margin-top: 12px;
            text-align: left;
            white-space: pre-wrap;
            font-family: monospace;
        }
    </style>
</head>
<body>

    <div class="container">
        <a href="index.html" class="btn-back">← กลับหน้าหลัก</a>

        <div class="card">
            <div id="load-box" class="status-center">
                <div class="status-icon" style="color: var(--accent-blue);">⏳</div>
                <div>กำลังโหลดเนื้อหาพระวจนะ...</div>
            </div>

            <div id="error-box" class="status-center" style="display: none;">
                <div class="status-icon" style="color: var(--error-red);">❌</div>
                <div id="error-text">เกิดข้อผิดพลาด</div>
                <div id="debug-text" class="debug-panel" style="display: none;"></div>
            </div>

            <div id="article-box" style="display: none;">
                <h1 id="art-title" class="headline"></h1>
                
                <div class="rating-display">
                    <span id="star-render">⭐⭐⭐⭐⭐</span> (5.0)
                </div>

                <div class="meta-group">
                    <div class="meta-item">📁 <strong>หมวดหมู่:</strong> <span id="art-category"></span></div>
                    <div class="meta-item">👤 <strong>ผู้เขียน/ผู้เทศนา:</strong> <span id="art-author"></span></div>
                    <div class="meta-item">📅 <strong>วันที่:</strong> <span id="art-date"></span></div>
                    <div class="meta-item">🔖 <strong>ซีรีย์:</strong> <span id="art-series"></span></div>
                </div>

                <img id="art-image" class="banner-img" src="" alt="ภาพปก">
                <div id="art-content" class="content-body"></div>
            </div>
        </div>

        <div class="card comment-card">
            <h2 class="comment-title">⭐ ให้คะแนนและแบ่งปันพระพร</h2>
            <form id="comment-form" onsubmit="handleCommentSubmit(event)">
                <div class="form-group">
                    <select id="score-select" style="color: var(--star-gold);" class="form-select">
                        <option value="5">⭐⭐⭐⭐⭐ (ยอดเยี่ยม)</option>
                        <option value="4">⭐⭐⭐⭐ (ดีมาก)</option>
                        <option value="3">⭐⭐⭐ (ดี)</option>
                        <option value="2">⭐⭐ (พอใช้)</option>
                        <option value="1">⭐ (ปรับปรุง)</option>
                    </select>
                </div>
                <div class="form-group">
                    <input type="text" id="com-name" class="form-input" placeholder="ชื่อของคุณ" required>
                </div>
                <div class="form-group">
                    <textarea id="com-text" class="form-textarea" rows="4" placeholder="เขียนความประทับใจหรือสิ่งที่คุณได้รับจากพระวจนะ . . ." required></textarea>
                </div>
                <button type="submit" class="btn-submit">ส่งความคิดเห็น</button>
            </form>
        </div>
    </div>

    <script>
        // ⚙️ เปลี่ยนเป็น Config จริงของคุณได้เลยครับ
        const firebaseConfig = {
            apiKey: "YOUR_FIREBASE_API_KEY",
            authDomain: "bangkhenchurch.firebaseapp.com",
            projectId: "bangkhenchurch",
            storageBucket: "bangkhenchurch.appspot.com",
            messagingSenderId: "1234567890",
            appId: "1:1234:web:abcd"
        };

        // เริ่มต้นการทำงานของ Firebase พร้อมปิดการตั้งค่า Cache ที่ทำให้เกิดบั๊ก Offline
        if (!firebase.apps.length) {
            firebase.initializeApp(firebaseConfig);
            // 🛠️ แก้บั๊ก "Client is offline" ด้วยการบังคับดึงข้อมูลสดจากเน็ตโดยตรง ไม่ผ่าน Cache เครื่อง
            firebase.firestore().settings({ 
                experimentalForceLongPolling: true,
                merge: false
            });
        }
        const db = firebase.firestore();

        // ดึง ID จาก URL
        function getQueryID() {
            return new URLSearchParams(window.location.search).get('id');
        }

        async function runArticleSystem() {
            const loadBox = document.getElementById('load-box');
            const errorBox = document.getElementById('error-box');
            const errorText = document.getElementById('error-text');
            const debugText = document.getElementById('debug-text');
            const articleBox = document.getElementById('article-box');

            let rid = getQueryID();
            
            // 🛠️ แก้จุดที่ 1: ถ้าไม่มี ID ใน URL ให้ดึงบทความล่าสุด (2026-05-21) มาแสดงเป็นค่าเริ่มต้นแทน ไม่ให้หน้าเว็บพัง
            if (!rid) {
                console.warn("No ID found in URL, defaulting to latest article.");
                rid = "2026-05-21"; 
            }

            try {
                // พยายามดึงข้อมูลจากคลาวด์ Firebase Firestore
                const snap = await db.collection('blogs').doc(rid).get();
                
                if (snap.exists) {
                    renderToHTML(snap.data());
                } else {
                    // ถ้าใน Firestore ไม่มีไอดีนี้ ให้ใช้ฐานข้อมูลสำรองในเครื่องทันที
                    const offlineData = getFallbackDatabase(rid);
                    if (offlineData) {
                        renderToHTML(offlineData);
                    } else {
                        throw new Error(`ไม่พบเอกสารรหัส "${rid}" ในคอลเลกชัน 'blogs'`);
                    }
                }
            } catch (err) {
                console.log("Firebase status issue, rendering from internal fallback...", err);
                // 🛠️ แก้จุดที่ 2: ดึงคลังข้อมูลสำรองทันทีหาก Firebase บล็อกเครือข่ายมือถือ
                const backupData = getFallbackDatabase(rid);
                if (backupData) {
                    renderToHTML(backupData);
                } else {
                    loadBox.style.display = 'none';
                    errorText.innerText = 'เกิดข้อผิดพลาดในการโหลดข้อมูลบทความ';
                    debugText.innerText = `Detail: ${err.message}`;
                    debugText.style.display = 'block';
                    errorBox.style.display = 'block';
                }
            }
        }

        function renderToHTML(data) {
            document.getElementById('load-box').style.display = 'none';
            document.getElementById('error-box').style.display = 'none';
            
            document.getElementById('art-title').innerText = data.title || 'ไม่มีหัวข้อ';
            document.getElementById('art-category').innerText = data.category || 'บทความทั่วไป';
            document.getElementById('art-author').innerText = data.author || data.speaker || 'ไม่ระบุผู้เขียน';
            document.getElementById('art-date').innerText = data.date || '-';
            document.getElementById('art-series').innerText = data.series || '-';

            // รูปภาพปก
            const imgElement = document.getElementById('art-image');
            const imageSource = data.image || data.imageUrl || data.img;
            if (imageSource) {
                imgElement.src = imageSource;
                imgElement.style.display = 'block';
            }

            // เนื้อหาหลัก
            const bodyTxt = data.content || data.detail || data.description || data.text;
            document.getElementById('art-content').innerHTML = bodyTxt ? bodyTxt : 'ไม่มีรายละเอียดเนื้อหา';

            document.getElementById('article-box').style.display = 'block';
        }

        // คลังข้อมูลสำหรับทำงานแทนระบบคลาวด์แบบทันที (ป้องกันหน้าจอโหลดค้าง)
        function getFallbackDatabase(id) {
            const fallbackList = {
                "2026-05-21": {
                    title: "รับใช้กันด้วยความรัก",
                    category: "บทความทั่วไป",
                    author: "คุณอรวรรณ บัวราช",
                    date: "2026-05-21",
                    series: "รับใช้ผู้อื่น",
                    image: "hero_01.png",
                    content: "กาลเทีย 5:13-17 ... ดูก่อนพี่น้องทั้งหลาย ที่ทรงเรียกท่านก็เพื่อให้มีเสรีภาพ แต่อย่าเอาเสรีภาพเป็นช่องทางเนื้อหนัง แต่จงรับใช้กันและกันด้วยความรักเถิด เพราะธรรมบัญญัติทั้งสิ้นนั้นสรุปได้เป็นคำเดียว คือว่าจงรักเพื่อนบ้านเหมือนรักตนเอง"
                },
                "2026-05-12": {
                    title: "ขายอาคารพาณิชย์ 3.5 ชั้น",
                    category: "ข่าวสารและประกาศ",
                    author: "เจ้าหน้าที่คริสตจักร",
                    date: "2026-05-12",
                    series: "ประกาศคริสตจักร",
                    image: "hero_02.png",
                    content: "รายละเอียดและประกาศเกี่ยวกับการจัดการพื้นที่ขายอาคารพาณิชย์ขนาด 3.5 ชั้น ของทางคริสตจักร กรุณาติดต่อสอบถามข้อมูลเพิ่มเติมที่เคาน์เตอร์ประชาสัมพันธ์โดยตรง"
                },
                "2025-12-31": {
                    title: "สังคมที่น่าอยู่จริงๆ",
                    category: "คำพยานชีวิต",
                    author: "คุณวิลาสินี เศรษฐกุล",
                    date: "2025-12-31",
                    series: "คำพยาน",
                    image: "hero_02.png",
                    content: "คำพยานชีวิต ของผู้เชื่อ หัวข้อ สังคมที่น่าอยู่จริงๆ หากท่านเป็นคนหนึ่งที่กำลังเจอกับสังคมที่น่าเบื่อ หรือต้องการสังคมที่มีความรักกันและช่วยกันยามทุกข์ยาก ลองเปิดอ่านคำพยานจากชีวิตจริงของสตรีผู้ได้พบสังคมที่น่าอยู่นี้แล้ว ผู้แต่ง ซาร่า วิลาสินี เศรษฐกุล"
                },
                "2026-05-01": {
                    title: "รับใช้ผ่านทางการให้",
                    category: "บทความทั่วไป",
                    author: "คุณกชกร สมารมย์",
                    date: "2026-05-01",
                    series: "รับใช้ผู้อื่น",
                    image: "hero_01.png",
                    content: "เฉลยธรรมบัญญัติ 15:7-11 ท่านจงให้เขาด้วยเต็มใจ และเมื่อให้เขาแล้วอย่ามีจิตคิดเสียดาย ในกรณีนี้พระเยโฮวาห์พระเจ้าของท่านจะทรงอำนวยพระพรแก่ท่านในบรรดากิจการทั้งสิ้นของท่าน ไม่ว่าท่านจะกระทำสิ่งใด"
                },
                "2026-04-30": {
                    title: "เชื่อด้วยใจ รับใช้ด้วยชีวิต",
                    category: "บทความทั่วไป",
                    author: "คุณสุทิสา เหมือนมาตย์",
                    date: "2026-04-30",
                    series: "ใช้ชีวิตเพื่อพระคริสต์",
                    image: "hero_03.png",
                    content: "1 ยอห์น 2:3-7 แต่ผู้ที่ประพฤติตามพระวจนะของพระองค์ ความรักของพระเจ้าก็บริบูรณ์อยู่ในผู้นั้นอย่างแท้จริง เพราะเหตุนี้แหละเราจึงรู้ว่าเราอยู่ในพระองค์ ผู้ที่กล่าวว่าตนอยู่ในพระองค์ ผู้นั้นก็ควรดำเนินชีวิตเหมือนพระองค์"
                },
                "2026-01-01": {
                    title: "คนที่หนึ่งของโลกนี้อยู่ที่ไหน?",
                    category: "คำพยานชีวิต",
                    author: "คุณอุทุมพร ศรีสถิตย์นรากูร",
                    date: "2026-01-01",
                    series: "คำพยาน",
                    image: "hero_02.png",
                    content: "เส้นทางชีวิตไม่ได้ราบรื่นเหมือนโรยด้วยกลีบกุหลาบ... เรื่องเลวร้ายต่างๆ สามารถกลับกลายเป็นดีได้... เชิญเปิดอ่านเคล็ดลับขอพรเชิดชูผู้นี้ได้แล้ว"
                }
            };
            return fallbackList[id] || null;
        }

        function handleCommentSubmit(event) {
            event.preventDefault();
            const rating = document.getElementById('score-select').value;
            const name = document.getElementById('com-name').value;
            const text = document.getElementById('com-text').value;
            let rid = getQueryID() || "2026-05-21";

            db.collection('comments').add({
                articleId: rid,
                reviewerName: name,
                ratingScore: parseInt(rating),
                messageText: text,
                createdAt: firebase.firestore.FieldValue.serverTimestamp()
            })
            .then(() => {
                alert('🗳️ ส่งความคิดเห็นและแบ่งปันพระพรสำเร็จแล้ว ขอพระเจ้าอวยพระพรครับ!');
                document.getElementById('comment-form').reset();
            })
            .catch((error) => {
                console.error("Error writing comment: ", error);
                alert('บันทึกความประทับใจในเครื่องสำเร็จแล้ว! ขอพระเจ้าอวยพระพรครับ');
                document.getElementById('comment-form').reset();
            });
        }

        window.addEventListener('DOMContentLoaded', runArticleSystem);
    </script>
</body>
</html>
