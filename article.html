<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>รายละเอียดบทความ - Bangkhen Baptist Church</title>
    <link href="https://fonts.googleapis.com/css2?family=Sarabun:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore-compat.js"></script>

    <style>
        :root {
            --bg-color: #121212;
            --card-bg: #1e1e1e;
            --input-bg: #000000;
            --accent-blue: #4da3ff;
            --text-main: #ffffff;
            --text-muted: #b0b0b0;
            --star-gold: #ffcc00;
            --error-red: #ff4d4d;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Sarabun', sans-serif;
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-main);
            padding: 16px;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
        }

        .container {
            width: 100%;
            max-width: 600px;
        }

        .btn-back {
            display: inline-block;
            color: var(--accent-blue);
            text-decoration: none;
            font-size: 14px;
            margin-bottom: 16px;
        }

        .card {
            background-color: var(--card-bg);
            border-radius: 16px;
            padding: 20px;
            box-shadow: 0 4px 20px rgba(0,0,0,0.5);
            margin-bottom: 20px;
        }

        .headline {
            font-size: 24px;
            font-weight: 700;
            line-height: 1.4;
            margin-bottom: 16px;
        }

        .meta-group {
            background-color: rgba(255,255,255,0.04);
            border-left: 4px solid var(--accent-blue);
            border-radius: 6px;
            padding: 14px;
            margin-bottom: 20px;
        }

        .meta-item {
            font-size: 14px;
            margin-bottom: 8px;
            color: var(--text-muted);
            display: flex;
        }

        .meta-item strong {
            color: var(--text-main);
            margin-right: 6px;
            white-space: nowrap;
        }

        .banner-img {
            width: 100%;
            border-radius: 12px;
            margin-bottom: 20px;
            display: none;
            object-fit: cover;
        }

        .content-body {
            font-size: 16px;
            line-height: 1.8;
            color: #e0e0e0;
            white-space: pre-wrap;
            word-break: break-word;
            margin-bottom: 15px;
        }

        .rating-summary {
            font-size: 15px;
            color: var(--text-muted);
            margin-bottom: 15px;
            display: flex;
            align-items: center;
            gap: 6px;
        }

        .star-gold {
            color: var(--star-gold);
        }

        .comment-card {
            border: 1px dashed #333;
        }

        .comment-title {
            font-size: 18px;
            font-weight: 600;
            margin-bottom: 15px;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .form-group {
            margin-bottom: 12px;
        }

        .form-select, .form-input, .form-textarea {
            width: 100%;
            background-color: var(--input-bg);
            border: 1px solid #333;
            border-radius: 8px;
            color: white;
            padding: 12px;
            font-size: 15px;
            outline: none;
        }

        .btn-submit {
            width: 100%;
            background-color: #4da3ff;
            color: black;
            font-weight: 600;
            border: none;
            padding: 14px;
            border-radius: 8px;
            font-size: 16px;
            cursor: pointer;
        }

        /* รายชื่อความคิดเห็น */
        .comments-list-section {
            margin-top: 20px;
        }

        .comment-item {
            background: rgba(255, 255, 255, 0.03);
            border-radius: 8px;
            padding: 12px;
            margin-bottom: 10px;
            border-left: 3px solid #555;
        }

        .comment-header {
            display: flex;
            justify-content: space-between;
            font-size: 13px;
            color: var(--text-muted);
            margin-bottom: 6px;
        }

        .comment-user {
            font-weight: 600;
            color: var(--text-main);
        }

        .comment-text {
            font-size: 14px;
            color: #d1d1d1;
            white-space: pre-wrap;
        }

        .status-center {
            text-align: center;
            padding: 30px 10px;
        }

        .status-icon {
            font-size: 48px;
            margin-bottom: 12px;
        }

        .debug-panel {
            background-color: #241414;
            border: 1px solid var(--error-red);
            color: #ffb3b3;
            padding: 10px;
            font-size: 12px;
            border-radius: 6px;
            margin-top: 12px;
            text-align: left;
            white-space: pre-wrap;
            font-family: monospace;
        }
    </style>
</head>
<body>

    <div class="container">
        <a href="index.html" class="btn-back">← กลับหน้าหลัก</a>

        <div class="card">
            <div id="load-box" class="status-center">
                <div class="status-icon" style="color: var(--accent-blue);">⏳</div>
                <div>กำลังโหลดเนื้อหาพระวจนะ...</div>
            </div>

            <div id="error-box" class="status-center" style="display: none;">
                <div class="status-icon" style="color: var(--error-red);">❌</div>
                <div id="error-text">เกิดข้อผิดพลาด</div>
                <div id="debug-text" class="debug-panel" style="display: none;"></div>
            </div>

            <div id="article-box" style="display: none;">
                <h1 id="art-title" class="headline"></h1>
                
                <div class="rating-summary">
                    <span id="star-render" class="star-gold"></span>
                    <span id="score-text"></span>
                </div>

                <div class="meta-group">
                    <div class="meta-item">📁 <strong>หมวดหมู่:</strong> <span id="art-category"></span></div>
                    <div class="meta-item">👤 <strong>ผู้เขียน/ผู้เทศนา:</strong> <span id="art-author"></span></div>
                    <div class="meta-item">📅 <strong>วันที่:</strong> <span id="art-date"></span></div>
                    <div class="meta-item">🔖 <strong>ซีรีย์:</strong> <span id="art-series"></span></div>
                </div>

                <img id="art-image" class="banner-img" src="" alt="ภาพปก">
                <div id="art-content" class="content-body"></div>
            </div>
        </div>

        <div class="card comment-card">
            <h2 class="comment-title">⭐ ให้คะแนนและแบ่งปันพระพร</h2>
            <form id="comment-form" onsubmit="handleCommentSubmit(event)">
                <div class="form-group">
                    <select id="score-select" style="color: var(--star-gold);" class="form-select">
                        <option value="5">⭐⭐⭐⭐⭐ (ยอดเยี่ยม)</option>
                        <option value="4">⭐⭐⭐⭐ (ดีมาก)</option>
                        <option value="3">⭐⭐⭐ (ดี)</option>
                        <option value="2">⭐⭐ (พอใช้)</option>
                        <option value="1">⭐ (ปรับปรุง)</option>
                    </select>
                </div>
                <div class="form-group">
                    <input type="text" id="com-name" class="form-input" placeholder="ชื่อของคุณ" required>
                </div>
                <div class="form-group">
                    <textarea id="com-text" class="form-textarea" rows="4" placeholder="เขียนความประทับใจหรือสิ่งที่คุณได้รับจากพระวจนะ . . ." required></textarea>
                </div>
                <button type="submit" class="btn-submit">ส่งความคิดเห็น</button>
            </form>

            <div class="comments-list-section">
                <h3 style="font-size: 15px; margin-bottom: 10px; color: var(--text-muted);">บทความแบ่งปันพระพรจากพี่น้อง:</h3>
                <div id="comments-container">
                    <div style="font-size: 13px; color: var(--text-muted); text-align: center; padding: 10px;">ยังไม่มีคำแบ่งปันในบทความนี้</div>
                </div>
            </div>
        </div>
    </div>

    <script>
        // กำหนดคอนฟิก Firebase
        const firebaseConfig = {
            apiKey: "YOUR_FIREBASE_API_KEY",
            authDomain: "bangkhenchurch.firebaseapp.com",
            projectId: "bangkhenchurch",
            storageBucket: "bangkhenchurch.appspot.com",
            messagingSenderId: "1234567890",
            appId: "1:1234:web:abcd"
        };

        if (!firebase.apps.length) {
            firebase.initializeApp(firebaseConfig);
            // บังคับใช้ Long Polling เพื่อป้องกันบั๊กเครือข่ายมือถือหลุดไปโหมดออฟไลน์
            firebase.firestore().settings({ experimentalForceLongPolling: true });
        }
        const db = firebase.firestore();

        function getQueryID() {
            return new URLSearchParams(window.location.search).get('id');
        }

        async function runArticleSystem() {
            const loadBox = document.getElementById('load-box');
            const errorBox = document.getElementById('error-box');
            const errorText = document.getElementById('error-text');
            const debugText = document.getElementById('debug-text');

            let rid = getQueryID();
            
            // ป้องกัน URL หลุด: ถ้าไม่มี ID ให้ดึงบทความล่าสุดเป็น Default
            if (!rid) {
                console.warn("No ID found in URL, defaulting to latest article.");
                rid = "2026-05-21"; 
            }

            try {
                // 🛠️ เปลี่ยนจาก 'blogs' เป็น 'articles' เพื่อให้ตรงกับ Firebase Rules บรรทัดที่ 19
                const snap = await db.collection('articles').doc(rid).get();
                
                if (snap.exists) {
                    renderToHTML(snap.data());
                } else {
                    const offlineData = getFallbackDatabase(rid);
                    if (offlineData) {
                        renderToHTML(offlineData);
                    } else {
                        throw new Error(`ไม่พบเอกสารรหัส "${rid}" ในคอลเลกชัน 'articles'`);
                    }
                }

                // โหลดคอมเมนต์และความคิดเห็นที่เกี่ยวข้อง
                loadArticleComments(rid);

            } catch (err) {
                console.log("Firebase query error, switching to internal backup...", err);
                const backupData = getFallbackDatabase(rid);
                if (backupData) {
                    renderToHTML(backupData);
                    loadArticleComments(rid);
                } else {
                    loadBox.style.display = 'none';
                    errorText.innerText = 'เกิดข้อผิดพลาดในการดึงข้อมูลข้อมูล';
                    debugText.innerText = `Detail: ${err.message}`;
                    debugText.style.display = 'block';
                    errorBox.style.display = 'block';
                }
            }
        }

        function renderToHTML(data) {
            document.getElementById('load-box').style.display = 'none';
            document.getElementById('error-box').style.display = 'none';
            
            document.getElementById('art-title').innerText = data.title || 'ไม่มีหัวข้อ';
            document.getElementById('art-category').innerText = data.category || 'บทความทั่วไป';
            document.getElementById('art-author').innerText = data.author || data.speaker || data.speakerName || 'ไม่ระบุผู้เขียน';
            document.getElementById('art-date').innerText = data.date || '-';
            document.getElementById('art-series').innerText = data.series || '-';

            // จัดการรูปภาพปก
            const imgElement = document.getElementById('art-image');
            const imageSource = data.image || data.imageUrl || data.img;
            if (imageSource) {
                imgElement.src = imageSource;
                imgElement.style.display = 'block';
            }

            // จัดการรายละเอียดเนื้อหาหลัก
            const bodyTxt = data.content || data.detail || data.description || data.text;
            document.getElementById('art-content').innerHTML = bodyTxt ? bodyTxt : 'ไม่มีรายละเอียดเนื้อหา';

            document.getElementById('article-box').style.display = 'block';
        }

        // ฟังก์ชันดึงรายการความคิดเห็นและคะแนนรีวิวจากคอลเลกชัน 'comments'
        function loadArticleComments(articleId) {
            db.collection('comments')
                .where('articleId', '==', articleId)
                .orderBy('createdAt', 'desc')
                .get()
                .then((querySnapshot) => {
                    const container = document.getElementById('comments-container');
                    const starRender = document.getElementById('star-render');
                    const scoreText = document.getElementById('score-text');

                    if (querySnapshot.empty) {
                        starRender.innerHTML = "⭐⭐⭐⭐⭐";
                        scoreText.innerText = "(5.0) | 0 ความคิดเห็น";
                        container.innerHTML = '<div style="font-size: 13px; color: var(--text-muted); text-align: center; padding: 10px;">ยังไม่มีคำแบ่งปันในบทความนี้</div>';
                        return;
                    }

                    let totalScore = 0;
                    let count = 0;
                    let html = '';

                    querySnapshot.forEach((doc) => {
                        const com = doc.data();
                        totalScore += com.ratingScore || 5;
                        count++;

                        let stars = '⭐'.repeat(com.ratingScore || 5);
                        let displayDate = com.createdAt ? new Date(com.createdAt.seconds * 1000).toLocaleDateString('th-TH') : '';

                        html += `
                            <div class="comment-item">
                                <div class="comment-header">
                                    <span class="comment-user">👤 ${com.reviewerName || 'ผู้ไม่ประสงค์ออกนาม'}</span>
                                    <span>${stars}</span>
                                </div>
                                <div class="comment-text">${com.messageText || ''}</div>
                                <div style="font-size: 10px; color: var(--text-muted); text-align: right; margin-top: 4px;">${displayDate}</div>
                            </div>
                        `;
                    });

                    // คำนวณคะแนนเฉลี่ย
                    let avg = (totalScore / count).toFixed(1);
                    starRender.innerHTML = '⭐'.repeat(Math.round(avg));
                    scoreText.innerText = `(${avg}) | ${count} ความคิดเห็น`;
                    container.innerHTML = html;
                })
                .catch((error) => {
                    console.error("Error loading comments: ", error);
                    // กรณีติดสิทธิ์การโหลดให้คงค่า Default ไว้
                    document.getElementById('star-render').innerHTML = "⭐⭐⭐⭐⭐";
                    document.getElementById('score-text').innerText = "(5.0)";
                });
        }

        // ฟังก์ชันส่งฟอร์มบันทึกความคิดเห็นลงใน 'comments' (ตรงกับ Rules บรรทัดที่ 58)
        function handleCommentSubmit(event) {
            event.preventDefault();
            const rating = document.getElementById('score-select').value;
            const name = document.getElementById('com-name').value;
            const text = document.getElementById('com-text').value;
            let rid = getQueryID() || "2026-05-21";

            db.collection('comments').add({
                articleId: rid,
                reviewerName: name,
                ratingScore: parseInt(rating),
                messageText: text,
                createdAt: firebase.firestore.FieldValue.serverTimestamp()
            })
            .then(() => {
                alert('🗳️ ส่งความคิดเห็นและแบ่งปันพระพรสำเร็จแล้ว ขอพระเจ้าอวยพระพรครับ!');
                document.getElementById('comment-form').reset();
                loadArticleComments(rid); // รีโหลดแสดงคอมเมนต์ใหม่ทันที
            })
            .catch((error) => {
                console.error("Error writing comment: ", error);
                alert('ไม่สามารถส่งความคิดเห็นได้ในขณะนี้ กรุณาลองใหม่อีกครั้ง');
            });
        }

        // ฐานข้อมูลสำรองกรณีกดลิงก์มาช่วงออฟไลน์ หรือดึงคลาวด์ไม่ได้
        function getFallbackDatabase(id) {
            const fallbackList = {
                "2026-05-21": {
                    title: "รับใช้กันด้วยความรัก",
                    category: "บทความทั่วไป",

                    date: "2026-05-21",
                    series: "รับใช้ผู้อื่น",

                },
                "2026-05-12": {

                },
                "2025-12-31": {
                    title: "สังคมที่น่าอยู่จริงๆ",

                },
                "2026-04-30": {

                },
                "2026-01-01": {
