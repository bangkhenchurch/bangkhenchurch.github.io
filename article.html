<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>บทความ - Bangkhen Baptist Church</title>
    <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore-compat.js"></script>
    <style>
        body { background-color: #121212; color: #eee; font-family: 'Sarabun', sans-serif; padding: 20px; }
        .container { max-width: 600px; margin: auto; }
        .error-msg { background: #331a1a; color: #ff8a8a; padding: 20px; border-radius: 10px; border: 1px solid #772222; text-align: center; }
        .loading { text-align: center; color: #888; margin-top: 50px; }
    </style>
</head>
<body>

<div class="container">
    <a href="index.html" style="color: #4dabff;">← กลับหน้าแรก</a>
    
    <div id="status-area">
        <div class="loading">⏳ กำลังเชื่อมต่อฐานข้อมูล...</div>
    </div>
</div>

<script>
    // 1. ตั้งค่า Firebase
    const firebaseConfig = {
        apiKey: "AIzaSyDw9PPAcnoQUcVnHpcndJ5OpBcmYYnMq3",
        authDomain: "bbcchurch-6ffc3.firebaseapp.com",
        projectId: "bbcchurch-6ffc3",
        storageBucket: "bbcchurch-6ffc3.appspot.com",
        appId: "1:1007626508012:web:b936b62bf0ea69b31877c9"
    };

    if (!firebase.apps.length) {
        firebase.initializeApp(firebaseConfig);
    }
    const db = firebase.firestore();

    // 2. ดึง ID จาก URL
    const urlParams = new URLSearchParams(window.location.search);
    const articleId = urlParams.get('id');

    async function loadArticle() {
        const statusArea = document.getElementById('status-area');
        
        if (!articleId) {
            statusArea.innerHTML = `<div class="error-msg">❌ ไม่พบรหัสบทความใน URL (โปรดตรวจสอบลิงก์)</div>`;
            return;
        }

        try {
            // ดึงข้อมูลจากคอลเลกชันชื่อ 'articles'
            const doc = await db.collection('articles').doc(articleId).get();
            
            if (doc.exists) {
                const data = doc.data();
                statusArea.innerHTML = `<h1>${data.title || 'ไม่มีชื่อเรื่อง'}</h1><p>${data.content || 'ไม่มีเนื้อหา'}</p>`;
            } else {
                statusArea.innerHTML = `<div class="error-msg">❌ ไม่พบข้อมูลบทความนี้ในระบบ</div>`;
            }
        } catch (error) {
            console.error("Firebase Error:", error);
            statusArea.innerHTML = `<div class="error-msg">❌ เกิดข้อผิดพลาด: ${error.message}</div>`;
        }
    }

    loadArticle();
</script>

</body>
</html>
