<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>รายละเอียดบทความ - Bangkhen Baptist Church</title>
    <link href="https://fonts.googleapis.com/css2?family=Sarabun:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore-compat.js"></script>

    <style>
        :root {
            --bg-dark: #121212;
            --card-dark: #1e1e1e;
            --accent-blue: #2196F3;
            --text-main: #ffffff;
            --text-sub: #b0b0b0;
            --error-red: #ff4d4d;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Sarabun', sans-serif;
        }

        body {
            background-color: var(--bg-dark);
            color: var(--text-main);
            padding: 16px;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
        }

        .wrapper {
            width: 100%;
            max-width: 600px;
        }

        .btn-back-link {
            display: inline-flex;
            align-items: center;
            color: #4da3ff;
            text-decoration: none;
            font-size: 14px;
            margin-bottom: 16px;
        }

        .main-card {
            background-color: var(--card-dark);
            border-radius: 16px;
            padding: 20px;
            box-shadow: 0 4px 20px rgba(0, 0, 0, 0.4);
            margin-bottom: 20px;
        }

        .article-headline {
            font-size: 24px;
            font-weight: 700;
            line-height: 1.4;
            margin-bottom: 16px;
        }

        .meta-container {
            background-color: rgba(255, 255, 255, 0.04);
            border-left: 4px solid var(--accent-blue);
            border-radius: 6px;
            padding: 14px;
            margin-bottom: 20px;
        }

        .meta-row {
            font-size: 14px;
            margin-bottom: 8px;
            color: var(--text-sub);
            display: flex;
            align-items: flex-start;
        }

        .meta-row strong {
            color: var(--text-main);
            white-space: nowrap;
            margin-right: 6px;
        }

        .responsive-banner {
            width: 100%;
            border-radius: 12px;
            margin-bottom: 20px;
            display: none;
            object-fit: cover;
            max-height: 350px;
        }

        .body-text-content {
            font-size: 16px;
            line-height: 1.8;
            color: #e0e0e0;
            white-space: pre-wrap;
            word-break: break-word;
            margin-bottom: 10px;
        }

        .status-box {
            text-align: center;
            padding: 40px 10px;
        }

        .status-icon {
            font-size: 48px;
            margin-bottom: 16px;
        }

        .status-msg {
            font-size: 18px;
            font-weight: 500;
        }

        .debug-box {
            background-color: #2d1616;
            border: 1px solid var(--error-red);
            color: #ffb3b3;
            padding: 12px;
            border-radius: 8px;
            margin-top: 15px;
            font-family: monospace;
            font-size: 12px;
            text-align: left;
            white-space: pre-wrap;
            display: none;
        }

        .btn-footer-back {
            display: block;
            width: 100%;
            text-align: center;
            background-color: #2a2a2a;
            color: #ffffff;
            text-decoration: none;
            padding: 12px;
            border-radius: 8px;
            font-size: 15px;
            margin-top: 20px;
            border: 1px solid #3a3a3a;
        }
    </style>
</head>
<body>

    <div class="wrapper">
        <a href="index.html" class="btn-back-link">← กลับหน้าหลัก</a>

        <div class="main-card">
            
            <div id="loading-block" class="status-box">
                <div class="status-icon" style="color: var(--accent-blue);">⏳</div>
                <div class="status-msg">กำลังโหลดเนื้อหา...</div>
            </div>

            <div id="error-block" class="status-box" style="display: none;">
                <div id="err-icon" class="status-icon" style="color: var(--error-red);">❌</div>
                <div id="err-text" class="status-msg">เกิดข้อผิดพลาด</div>
                <div id="debug-info" class="debug-box"></div>
            </div>

            <div id="content-block" style="display: none;">
                <h1 id="view-title" class="article-headline"></h1>
                
                <div class="meta-container">
                    <div class="meta-row">🏷️ <strong>หมวดหมู่:</strong> <span id="view-category"></span></div>
                    <div class="meta-row">👤 <strong>ผู้เขียน/ผู้เทศนา:</strong> <span id="view-author"></span></div>
                    <div class="meta-row">📅 <strong>วันที่:</strong> <span id="view-date"></span></div>
                    <div class="meta-row">🔖 <strong>ซีรีย์:</strong> <span id="view-series"></span></div>
                </div>

                <img id="view-image" class="responsive-banner" src="" alt="ภาพประกอบ">

                <div id="view-content" class="body-text-content"></div>

                <a href="index.html" class="btn-footer-back">↩ ย้อนกลับไปหน้าหลัก</a>
            </div>

        </div>
    </div>

    <script>
        // 🛠️ คัดลอกค่า Config ของ Firebase จากโปรเจกต์ของคุณมาใส่ตรงนี้แทนได้เลยครับ
        const firebaseConfig = {
            apiKey: "YOUR_API_KEY",
            authDomain: "YOUR_AUTH_DOMAIN",
            projectId: "YOUR_PROJECT_ID",
            storageBucket: "YOUR_STORAGE_BUCKET",
            messagingSenderId: "YOUR_MESSAGING_SENDER_ID",
            appId: "YOUR_APP_ID"
        };

        // เริ่มต้นการใช้งาน Firebase
        if (!firebase.apps.length) {
            firebase.initializeApp(firebaseConfig);
        }
        const db = firebase.firestore();

        // ฟังก์ชันดึงค่า ID จาก URL Parameter (?id=...)
        function fetchParamId() {
            const pathParams = new URLSearchParams(window.location.search);
            return pathParams.get('id');
        }

        // ฟังก์ชันหลักในการดึงข้อมูลและแสดงผล
        async function initArticleLoader() {
            const articleId = fetchParamId();
            
            const loadingEl = document.getElementById('loading-block');
            const errorEl = document.getElementById('error-block');
            const errTextEl = document.getElementById('err-text');
            const debugInfoEl = document.getElementById('debug-info');
            const contentEl = document.getElementById('content-block');

            // แสดง Log บอกข้อผิดพลาดลงบนหน้าจอเพื่อตรวจเช็คได้ง่ายบนมือถือ
            function showErrorMessage(msg, debugLogs = "") {
                loadingEl.style.display = 'none';
                errTextEl.innerText = msg;
                if (debugLogs) {
                    debugInfoEl.innerText = debugLogs;
                    debugInfoEl.style.display = 'block';
                }
                errorEl.style.display = 'block';
            }

            if (!articleId) {
                showErrorMessage('ไม่มี ID บทความใน URL', 'กรุณาตรวจสอบว่า URL มี ?id=... หรือไม่');
                return;
            }

            try {
                /* ดึงข้อมูลจากคอลเลกชันใน Firestore (สมมติว่าชื่อคอลเลกชันคือ 'blogs' หรือ 'articles')
                  หากชื่อคอลเลกชันของคุณเป็นชื่ออื่น ให้เปลี่ยนคำว่า 'blogs' ในบรรทัดด้านล่างนี้ครับ
                */
                const docRef = db.collection('blogs').doc(articleId);
                const docSnap = await docRef.get();

                if (!docSnap.exists) {
                    showErrorMessage('ไม่พบเนื้อหาบทความที่ระบุ', `ไม่พบเอกสาร ID: "${articleId}" ในคอลเลกชัน 'blogs'`);
                    return;
                }

                const dataResult = docSnap.data();

                // ใส่ข้อมูลลงในหน้าเว็บ
                document.getElementById('view-title').innerText = dataResult.title || 'ไม่มีชื่อหัวข้อ';
                document.getElementById('view-category').innerText = dataResult.category || 'ทั่วไป';
                document.getElementById('view-author').innerText = dataResult.author || dataResult.speaker || 'ไม่ระบุชื่อ';
                document.getElementById('view-date').innerText = dataResult.date || '-';
                document.getElementById('view-series').innerText = dataResult.series || '-';

                // ดึงข้อมูลเนื้อหาหลัก
                const rawContent = dataResult.content || dataResult.detail || dataResult.description || dataResult.text;
                const contentArea = document.getElementById('view-content');
                
                if (rawContent && rawContent.trim() !== "") {
                    contentArea.innerHTML = rawContent;
                } else {
                    contentArea.innerText = 'ไม่มีรายละเอียดเนื้อหา';
                }

                // ดึงรูปภาพ
                const imgTarget = document.getElementById('view-image');
                const imgUrl = dataResult.image || dataResult.imageUrl || dataResult.img;
                if (imgUrl) {
                    imgTarget.src = imgUrl;
                    imgTarget.style.display = 'block';
                } else {
                    imgTarget.style.display = 'none';
                }

                // สลับแสดงบล็อกเนื้อหาจริง
                loadingEl.style.display = 'none';
                contentEl.style.display = 'block';

            } catch (err) {
                console.error(err);
                showErrorMessage('เกิดข้อผิดพลาดในการเชื่อมต่อ Firebase', `Error: ${err.message}\nโปรดตรวจสอบ Firebase Config หรืออินเทอร์เน็ต`);
            }
        }

        window.addEventListener('DOMContentLoaded', initArticleLoader);
    </script>
</body>
</html>
