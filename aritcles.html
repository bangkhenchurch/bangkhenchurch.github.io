<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>อ่านบทความ - BBC Church</title>
    <link href="https://fonts.googleapis.com/css2?family=Sarabun:wght@300;400;700&family=Prompt:wght@400;600&display=swap" rel="stylesheet">
    <style>
        :root { --primary: #4dabff; --dark-bg: #121212; --card-bg: #1e1e1e; }
        body { background: var(--dark-bg); color: #e0e0e0; font-family: 'Sarabun', sans-serif; margin: 0; padding: 0; }
        .container { max-width: 800px; margin: 20px auto; padding: 20px; }
        
        .article-card { background: var(--card-bg); padding: 30px; border-radius: 15px; border: 1px solid #333; margin-bottom: 30px; }
        h1 { font-family: 'Prompt'; color: white; margin-top: 0; }
        .avg-rating { color: #f1c40f; font-size: 24px; margin-bottom: 20px; border-bottom: 1px solid #333; padding-bottom: 10px; }
        .content-text { line-height: 1.8; font-size: 16px; white-space: pre-line; }

        .comments-section { margin-top: 50px; }
        .comment-item { background: #252525; padding: 15px; border-radius: 10px; margin-bottom: 15px; border-left: 5px solid var(--primary); }
        .comment-user { font-weight: bold; color: var(--primary); }
        .comment-stars { color: #f1c40f; font-size: 14px; margin: 5px 0; }
        .comment-msg { color: #eee; font-size: 15px; }

        .rating-form { background: #1a1a1a; padding: 25px; border-radius: 15px; border: 1px dashed #444; margin-top: 50px; }
        .stars { display: flex; gap: 10px; margin: 15px 0; }
        .star { font-size: 30px; color: #444; cursor: pointer; }
        .star.active { color: #f1c40f; }
        input, textarea { width: 100%; padding: 12px; background: #000; border: 1px solid #333; color: white; border-radius: 8px; margin-top: 10px; box-sizing: border-box; }
        .btn-submit { width: 100%; padding: 15px; background: var(--primary); color: white; border: none; border-radius: 8px; cursor: pointer; font-weight: bold; margin-top: 20px; }
    </style>
</head>
<body>

<div class="container">
    <div class="article-card">
        <h1 id="artTitle">กำลังโหลด...</h1>
        <div id="artRating" class="avg-rating">☆☆☆☆☆ (0)</div>
        <div id="artBody" class="content-text"></div>
    </div>

    <div class="comments-section">
        <h3 style="font-family: 'Prompt'; color: var(--primary);">ความคิดเห็นและคำพยาน</h3>
        <div id="commentsList">กำลังตรวจสอบข้อมูล...</div>
    </div>

    <div class="rating-form">
        <h4 style="font-family: 'Prompt'; margin: 0;">ให้คะแนนและแสดงความคิดเห็น</h4>
        <input type="text" id="uName" placeholder="ชื่อของคุณ">
        <div class="stars" id="starGroup">
            <span class="star" data-v="1">★</span><span class="star" data-v="2">★</span>
            <span class="star" data-v="3">★</span><span class="star" data-v="4">★</span>
            <span class="star" data-v="5">★</span>
        </div>
        <textarea id="uMsg" rows="3" placeholder="เขียนข้อความของคุณที่นี่..."></textarea>
        <button id="submitBtn" class="btn-submit">ส่งความคิดเห็น</button>
    </div>
</div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
    import { getFirestore, doc, getDoc, collection, query, where, onSnapshot, addDoc, serverTimestamp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

    const firebaseConfig = {
        apiKey: "AIzaSyDw9PPAcnoQUcVnHpcndJ5OpBcmYYnMq3",
        authDomain: "bbcchurch-6ffc3.firebaseapp.com",
        projectId: "bbcchurch-6ffc3",
        storageBucket: "bbcchurch-6ffc3.appspot.com",
        appId: "1:1007626508012:web:b936b62bf0ea69b31877c9"
    };

    const app = initializeApp(firebaseConfig);
    const db = getFirestore(app);
    const artId = new URLSearchParams(window.location.search).get('id');

    // โหลดเนื้อหา
    async function loadContent() {
        if(!artId) return;
        const snap = await getDoc(doc(db, "articles", artId));
        if(snap.exists()) {
            document.getElementById('artTitle').innerText = snap.data().title;
            document.getElementById('artBody').innerText = snap.data().content;
        }
    }

    // โหลดคอมเมนต์ (เอา orderBy ออกเพื่อให้โชว์ทันที)
    function loadComments() {
        const q = query(
            collection(db, "ratings"), 
            where("articleId", "==", artId),
            where("approved", "==", true)
        );

        onSnapshot(q, (snap) => {
            const list = document.getElementById('commentsList');
            const avgHeader = document.getElementById('artRating');
            
            if(snap.empty) {
                list.innerHTML = "ยังไม่มีความคิดเห็นที่ได้รับอนุมัติในขณะนี้";
                avgHeader.innerHTML = "☆☆☆☆☆ (0)";
                return;
            }

            let html = "";
            let sumRating = 0;
            let count = 0;

            snap.forEach(d => {
                const data = d.data();
                sumRating += data.rating;
                count++;
                let s = ""; for(let i=1;i<=5;i++) s += i <= data.rating ? "★" : "☆";
                html += `
                    <div class="comment-item">
                        <div class="comment-user">👤 ${data.userName}</div>
                        <div class="comment-stars">${s}</div>
                        <div class="comment-msg">${data.comment || ""}</div>
                    </div>
                `;
            });
            list.innerHTML = html;

            const avg = (sumRating / count).toFixed(1);
            let avgS = ""; for(let i=1;i<=5;i++) avgS += i <= Math.round(avg) ? "★" : "☆";
            avgHeader.innerHTML = `${avgS} (${avg})`;
        });
    }

    // ดาวหน้ารูปแบบฟอร์ม
    let userStar = 0;
    const starList = document.querySelectorAll('.star');
    starList.forEach(s => {
        s.onclick = () => {
            userStar = s.getAttribute('data-v');
            starList.forEach((st, i) => st.classList.toggle('active', i < userStar));
        };
    });

    // ส่งข้อมูล
    document.getElementById('submitBtn').onclick = async () => {
        if(userStar == 0) return alert("กรุณาให้คะแนนดาว");
        const btn = document.getElementById('submitBtn');
        btn.disabled = true;
        try {
            await addDoc(collection(db, "ratings"), {
                articleId: artId,
                userName: document.getElementById('uName').value || "ผู้เยี่ยมชม",
                rating: parseInt(userStar),
                comment: document.getElementById('uMsg').value,
                approved: false,
                createdAt: serverTimestamp()
            });
            alert("ขอบคุณครับ! ความเห็นจะโชว์หลังจากแอดมินตรวจสอบ");
            location.reload();
        } catch (e) { alert("เกิดข้อผิดพลาด"); btn.disabled = false; }
    };

    loadContent();
    loadComments();
</script>
</body>
</html>
