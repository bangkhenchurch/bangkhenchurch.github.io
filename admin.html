<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>BBC Church - Admin Center</title>
    <link href="https://fonts.googleapis.com/css2?family=Sarabun:wght@300;400;700&family=Prompt:wght@400;600&display=swap" rel="stylesheet">
    <style>
        :root { 
            --primary: #4dabff; 
            --bg-black: #000; 
            --card-bg: #111; 
            --success: #27ae60; 
            --warning: #f39c12;
            --danger: #e74c3c; 
        }
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { background: var(--bg-black); color: #fff; font-family: 'Sarabun', sans-serif; padding: 20px; }
        .container { max-width: 1200px; margin: auto; }
        .admin-card { background: var(--card-bg); padding: 25px; border-radius: 15px; border: 1px solid #333; margin-bottom: 30px; }
        h2 { color: var(--primary); border-bottom: 2px solid var(--primary); padding-bottom: 10px; display: inline-block; margin-bottom: 20px; font-family: 'Prompt'; }
        .form-section { display: grid; grid-template-columns: repeat(auto-fit, minmax(250px, 1fr)); gap: 20px; margin-bottom: 20px; }
        label { display: block; margin-bottom: 5px; font-size: 14px; color: #ccc; }
        input, select, textarea { width: 100%; padding: 12px; background: #1a1a1a; border: 1px solid #333; color: white; border-radius: 8px; font-family: 'Sarabun', sans-serif; }
        input:focus, select:focus, textarea:focus { border-color: var(--primary); outline: none; }
        
        .btn-mini { background: var(--primary); border: none; color: white; padding: 5px 15px; border-radius: 8px; cursor: pointer; font-family: 'Prompt'; font-size: 13px; }
        .btn-mini.edit { background: var(--warning); }
        .btn-mini.del { background: var(--danger); }
        
        .btn-save { width: 100%; padding: 15px; background: var(--success); border: none; color: white; border-radius: 10px; font-weight: bold; font-size: 16px; cursor: pointer; font-family: 'Prompt'; transition: 0.2s; }
        .btn-save.mode-edit { background: var(--warning); }
        .btn-cancel { width: 100%; padding: 10px; background: #333; border: 1px solid #444; color: #ccc; border-radius: 10px; margin-top: 10px; cursor: pointer; font-family: 'Prompt'; display: none; text-align: center; }
        
        .article-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(300px, 1fr)); gap: 20px; }
        .article-card { background: #1a1a1a; padding: 15px; border-radius: 12px; border: 1px solid #333; display: flex; flex-direction: column; justify-content: space-between; }
        .card-img { width: 100%; height: 160px; object-fit: cover; border-radius: 8px; margin-bottom: 10px; }
        .meta-info { font-size: 12px; color: #aaa; margin-bottom: 5px; }
        .card-actions { display: flex; gap: 10px; margin-top: 15px; border-top: 1px solid #333; padding-top: 12px; }
        .card-actions button { flex: 1; padding: 8px; }
    </style>
</head>
<body>

<div class="container">
    <div class="admin-card">
        <h2 id="formTitle">✍️ บันทึกบทความใหม่</h2>
        <form id="articleForm">
            <input type="hidden" id="editId">
            
            <div class="form-section">
                <div><label>วันที่</label><input type="date" id="customDate" required></div>
                <div><label>หมวดหมู่</label>
                    <select id="category">
                        <option>🎙️ คำเทศนา</option>
                        <option>🌟 คำพยาน</option>
                        <option>📖 บทความ</option>
                        <option>📢 ข่าวสาร</option>
                    </select>
                </div>
                <div><label>ซีรีย์</label><input type="text" id="series"></div>
                <div><label>หัวข้อเรื่อง</label><input type="text" id="title" required></div>
                <div><label>ข้อพระธรรม</label><input type="text" id="bibleRef"></div>
                <div><label>ผู้แต่ง</label>
                    <div style="display:flex; gap:5px;">
                        <select id="authorSelect"></select>
                        <button type="button" class="btn-mini" onclick="addAuthor()">+</button>
                        <button type="button" class="btn-mini del" onclick="removeAuthor()">🗑️</button>
                    </div>
                </div>
                <div><label>รูปปกนำ (ปล่อยว่างได้หากไม่ต้องการเปลี่ยน)</label><input type="file" id="fileThumb" accept="image/*"></div>
                <div><label>รูปเนื้อหา 1 (ปล่อยว่างได้หากไม่ต้องการเปลี่ยน)</label><input type="file" id="filePic1" accept="image/*"></div>
                <div><label>รูปเนื้อหา 2 (ปล่อยว่างได้หากไม่ต้องการเปลี่ยน)</label><input type="file" id="filePic2" accept="image/*"></div>
                <div><label>YouTube 1</label><input type="text" id="yt1" placeholder="https://..."></div>
                <div><label>YouTube 2</label><input type="text" id="yt2" placeholder="https://..."></div>
            </div>
            <label>เนื้อหาบทความ</label>
            <textarea id="mainContent" rows="6" placeholder="พิมพ์เนื้อหาที่นี่..."></textarea>
            
            <button type="submit" id="btnSubmit" class="btn-save" style="margin-top:20px;">🚀 บันทึกข้อมูล</button>
            <button type="button" id="btnCancelEdit" class="btn-cancel" onclick="clearForm()">❌ ยกเลิกการแก้ไข</button>
        </form>
    </div>
    
    <div class="admin-card">
        <h2>📑 รายการเนื้อหาทั้งหมด</h2>
        <div id="articleContainer" class="article-grid"></div>
    </div>
</div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
    import { getFirestore, collection, addDoc, doc, updateDoc, deleteDoc, onSnapshot, getDoc } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";
    import { getStorage, ref, uploadBytesResumable, getDownloadURL } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-storage.js";

    const firebaseConfig = {
        apiKey: "AIzaSyDw9PPAcnoQUcVnHpcndJ5OpBcmYYnMq3",
        projectId: "bbcchurch-6ffc3",
        storageBucket: "bbcchurch-6ffc3.appspot.com",
        appId: "1:1007626508012:web:b936b62bf0ea69b31877c9"
    };

    const app = initializeApp(firebaseConfig);
    const db = getFirestore(app);
    const storage = getStorage(app);

    // เก็บข้อมูล URL รูปภาพเดิมไว้ใช้กรณีแก้ไขแล้วไม่ได้อัปโหลดรูปใหม่
    let existingThumbUrl = null;
    let existingPic1Url = null;
    let existingPic2Url = null;

    // ระบบจัดการผู้แต่ง
    const updateAuthorDropdown = () => {
        const authors = JSON.parse(localStorage.getItem('authors') || '["ศิษยาภิบาล", "ทีมงาน BBC"]');
        const select = document.getElementById('authorSelect');
        select.innerHTML = authors.map(a => `<option value="${a}">${a}</option>`).join('');
    };

    window.addAuthor = () => {
        const name = prompt("เพิ่มชื่อผู้แต่ง:");
        if (name) {
            const authors = JSON.parse(localStorage.getItem('authors') || '["ศิษยาภิบาล", "ทีมงาน BBC"]');
            authors.push(name);
            localStorage.setItem('authors', JSON.stringify(authors));
            updateAuthorDropdown();
        }
    };

    window.removeAuthor = () => {
        const select = document.getElementById('authorSelect');
        if (confirm(`ยืนยันการลบชื่อ "${select.value}"?`)) {
            let authors = JSON.parse(localStorage.getItem('authors') || '["ศิษยาภิบาล", "ทีมงาน BBC"]');
            authors = authors.filter(a => a !== select.value);
            localStorage.setItem('authors', JSON.stringify(authors));
            updateAuthorDropdown();
        }
    };
    updateAuthorDropdown();

    // อัปโหลดไฟล์ขึ้น Firebase Storage
    async function uploadFile(file) {
        if (!file) return null;
        const storageRef = ref(storage, 'arts/' + Date.now() + '_' + file.name);
        const res = await uploadBytesResumable(storageRef, file);
        return await getDownloadURL(res.ref);
    }

    // ฟังก์ชันล้างค่าในฟอร์มกลับเป็นปกติ
    window.clearForm = () => {
        document.getElementById("editId").value = "";
        document.getElementById("articleForm").reset();
        
        existingThumbUrl = null;
        existingPic1Url = null;
        existingPic2Url = null;

        document.getElementById("formTitle").innerText = "✍️ บันทึกบทความใหม่";
        const btnSubmit = document.getElementById("btnSubmit");
        btnSubmit.innerText = "🚀 บันทึกข้อมูล";
        btnSubmit.classList.remove("mode-edit");
        document.getElementById("btnCancelEdit").style.display = "none";
    };

    // ฟังก์ชันดึงข้อมูลมาเติมเพื่อทำการแก้ไข (Edit)
    window.editArt = async (id) => {
        try {
            const docRef = doc(db, "articles", id);
            const snap = await getDoc(docRef);
            
            if (snap.exists()) {
                const data = snap.data();
                
                // นำข้อมูลไปใส่ใน Input แต่ละช่อง
                document.getElementById("editId").value = id;
                document.getElementById("customDate").value = data.displayDate || "";
                document.getElementById("category").value = data.category || "🎙️ คำเทศนา";
                document.getElementById("series").value = data.series || "";
                document.getElementById("title").value = data.title || "";
                document.getElementById("bibleRef").value = data.bibleRef || "";
                document.getElementById("yt1").value = data.yt1 || "";
                document.getElementById("yt2").value = data.yt2 || "";
                document.getElementById("mainContent").value = data.mainContent || "";
                
                // ตรวจสอบและเลือกชื่อผู้แต่งใน Dropdown
                const authorSelect = document.getElementById("authorSelect");
                if ([...authorSelect.options].some(option => option.value === data.authorName)) {
                    authorSelect.value = data.authorName;
                }

                // จำ URL รูปภาพเก่าไว้ใช้กรณีไม่มีการเลือกรูปใหม่
                existingThumbUrl = data.thumbUrl || null;
                existingPic1Url = data.pic1 || null;
                existingPic2Url = data.pic2 || null;

                // เปลี่ยนแปลงหน้าตา UI ของฟอร์มให้เข้าสู่โหมดแก้ไข
                document.getElementById("formTitle").innerText = "✏️ กำลังแก้ไขบทความ";
                const btnSubmit = document.getElementById("btnSubmit");
                btnSubmit.innerText = "💾 อัปเดตข้อมูลบทความ";
                btnSubmit.classList.add("mode-edit");
                document.getElementById("btnCancelEdit").style.display = "block";

                // เลื่อนหน้าจอขึ้นไปที่ฟอร์มด้านบน (เหมาะมากเวลาทำบนมือถือ)
                window.scrollTo({ top: 0, behavior: 'smooth' });
            }
        } catch (err) {
            console.error("Error fetching document:", err);
            alert("ไม่สามารถดึงข้อมูลมาแก้ไขได้");
        }
    };

    // ฟังก์ชันทำงานตอนบันทึก (ทัั้งเขียนใหม่ และ อัปเดตตัวเก่า)
    document.getElementById("articleForm").onsubmit = async (e) => {
        e.preventDefault();
        
        const editId = document.getElementById("editId").value;
        const btnSubmit = document.getElementById("btnSubmit");
        btnSubmit.disabled = true;
        btnSubmit.innerText = "⏳ กำลังบันทึกข้อมูล...";

        try {
            // ตรวจสอบไฟล์รูปใหม่ ถ้าไม่มีให้ใช้รูปเก่า
            const fileThumb = document.getElementById("fileThumb").files[0];
            const filePic1 = document.getElementById("filePic1").files[0];
            const filePic2 = document.getElementById("filePic2").files[0];

            const thumbUrl = fileThumb ? await uploadFile(fileThumb) : existingThumbUrl;
            const pic1 = filePic1 ? await uploadFile(filePic1) : existingPic1Url;
            const pic2 = filePic2 ? await uploadFile(filePic2) : existingPic2Url;

            const data = {
                displayDate: document.getElementById("customDate").value,
                series: document.getElementById("series").value,
                category: document.getElementById("category").value,
                bibleRef: document.getElementById("bibleRef").value,
                title: document.getElementById("title").value,
                authorName: document.getElementById("authorSelect").value,
                yt1: document.getElementById("yt1").value,
                yt2: document.getElementById("yt2").value,
                mainContent: document.getElementById("mainContent").value,
                thumbUrl: thumbUrl,
                pic1: pic1,
                pic2: pic2
            };

            if (editId) {
                // โหมดแก้ไข: อัปเดตเอกสารเดิมในคอลเลกชัน "articles"
                await updateDoc(doc(db, "articles", editId), data);
                alert("อัปเดตข้อมูลสำเร็จ!");
            } else {
                // โหมดสร้างใหม่: เพิ่มเอกสารชุดใหม่เข้าไป
                await addDoc(collection(db, "articles"), data);
                alert("บันทึกสำเร็จ!");
            }
            
            clearForm();
        } catch (err) {
            console.error("Error saving document:", err);
            alert("เกิดข้อผิดพลาดในการบันทึกข้อมูล");
        } finally {
            btnSubmit.disabled = false;
        }
    };

    // ติดตามข้อมูลเรียลไทม์เพื่อนำมาแสดงในรายการเนื้อหาด้านล่าง
    onSnapshot(collection(db, "articles"), (snap) => {
        const container = document.getElementById("articleContainer");
        container.innerHTML = "";
        
        snap.forEach(d => {
            const i = d.data();
            container.innerHTML += `
                <div class="article-card">
                    <div>
                        <img src="${i.thumbUrl || 'https://placehold.co/600x400'}" class="card-img">
                        <div style="font-weight:bold; font-size:18px; margin-bottom:5px; color:#fff;">${i.title}</div>
                        <div class="meta-info">📁 หมวดหมู่: ${i.category || '-'}</div>
                        <div class="meta-info">📅 ${i.displayDate || '-'} | 📖 ข้อพระธรรม: ${i.bibleRef || '-'}</div>
                        <div class="meta-info">📁 ซีรีย์: ${i.series || '-'}</div>
                        <div class="meta-info">✍️ ผู้แต่ง: ${i.authorName || '-'}</div>
                    </div>
                    <div class="card-actions">
                        <button onclick="editArt('${d.id}')" class="btn-mini edit">✏️ แก้ไข</button>
                        <button onclick="deleteArt('${d.id}')" class="btn-mini del">🗑️ ลบ</button>
                    </div>
                </div>`;
        });
    });

    window.deleteArt = async (id) => {
        if(confirm('คุณแน่ใจหรือไม่ว่าต้องการลบบทความนี้อย่างถาวร?')) {
            try {
                await deleteDoc(doc(db, "articles", id));
                // ถ้าเกิดลบข้อมูลขณะที่กำลังเปิดแก้ไขตัวนั้นอยู่ ให้ล้างฟอร์มด้วย
                if(document.getElementById("editId").value === id) {
                    clearForm();
                }
            } catch (err) {
                console.error("Error deleting document:", err);
                alert("ไม่สามารถลบข้อมูลได้");
            }
        }
    };
</script>
</body>
</html>
