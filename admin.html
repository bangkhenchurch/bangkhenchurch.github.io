<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <title>BBC Church - Admin Dashboard</title>
    <style>
        :root { --bg: #000; --card: #111; --primary: #4dabff; --border: #333; --text: #fff; --success: #27ae60; --danger: #e74c3c; }
        body { background: var(--bg); color: var(--text); font-family: 'Sarabun', sans-serif; margin: 0; padding: 20px; }
        .container { max-width: 1000px; margin: auto; }
        .card { background: var(--card); padding: 25px; border-radius: 12px; border: 1px solid var(--border); margin-bottom: 30px; }
        h2 { color: var(--primary); border-bottom: 2px solid var(--primary); padding-bottom: 10px; }
        .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; }
        input, select, textarea { width: 100%; padding: 12px; background: #1a1a1a; border: 1px solid var(--border); color: #fff; border-radius: 6px; margin-top: 5px; }
        button { padding: 12px 20px; border: none; border-radius: 6px; cursor: pointer; font-weight: bold; }
        .btn-save { background: var(--success); color: white; width: 100%; margin-top: 20px; }
        table { width: 100%; border-collapse: collapse; margin-top: 15px; }
        th, td { border: 1px solid var(--border); padding: 12px; text-align: left; }
        .badge { padding: 5px 10px; border-radius: 4px; font-size: 12px; }
    </style>
</head>
<body>

<div class="container">
    <div class="card">
        <h2>✍️ บันทึกบทความ</h2>
        <form id="mainForm">
            <div class="grid">
                <div><label>วันที่</label><input type="date" id="date" required></div>
                <div><label>หมวดหมู่</label><select id="cat"><option>คำเทศนา</option><option>คำพยาน</option><option>บทความ</option><option>ข่าวสาร</option></select></div>
            </div>
            <label>หัวข้อเรื่อง</label><input type="text" id="title" required>
            <div class="grid">
                <div><label>ซีรีย์</label><input type="text" id="series"></div>
                <div><label>ผู้แต่ง/ผู้เทศนา</label><select id="authorList"></select></div>
            </div>
            <label>เนื้อหา</label><textarea id="content" rows="5"></textarea>
            <button type="submit" class="btn-save">บันทึกและแสดงผลทันที</button>
        </form>
    </div>

    <div class="card">
        <h2>💬 อนุมัติความคิดเห็น</h2>
        <table>
            <thead><tr><th>บทความ</th><th>ผู้ใช้</th><th>ดาว</th><th>ความเห็น</th><th>สถานะ</th><th>จัดการ</th></tr></thead>
            <tbody id="commentBody"></tbody>
        </table>
    </div>

    <div class="card">
        <h2>📑 รายการเนื้อหาทั้งหมด</h2>
        <div id="articleList"></div>
    </div>
</div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
    import { getFirestore, collection, addDoc, onSnapshot, updateDoc, doc, deleteDoc } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

    const firebaseConfig = {
        apiKey: "AIzaSyDw9PPAcnoQUcVnHpcndJ5OpBcmYYnMq3",
        authDomain: "bbcchurch-6ffc3.firebaseapp.com",
        projectId: "bbcchurch-6ffc3",
        storageBucket: "bbcchurch-6ffc3.firebasestorage.app",
        appId: "1:1007626508012:web:b936b62bf0ea69b31877c9"
    };

    const db = getFirestore(initializeApp(firebaseConfig));

    // บันทึกบทความ
    document.getElementById("mainForm").onsubmit = async (e) => {
        e.preventDefault();
        await addDoc(collection(db, "articles"), {
            date: document.getElementById("date").value,
            category: document.getElementById("cat").value,
            title: document.getElementById("title").value,
            series: document.getElementById("series").value,
            author: document.getElementById("authorList").value,
            content: document.getElementById("content").value
        });
        alert("บันทึกสำเร็จ!");
    };

    // โหลดความเห็น
    onSnapshot(collection(db, "comments"), (snap) => {
        const body = document.getElementById("commentBody");
        body.innerHTML = "";
        snap.forEach(d => {
            const c = d.data();
            body.innerHTML += `<tr>
                <td>${c.articleTitle}</td><td>${c.user}</td><td>${c.rating}</td><td>${c.text}</td>
                <td><span class="badge" style="background:${c.status=='approved'?'#27ae60':'#e67e22'}">${c.status}</span></td>
                <td>${c.status!='approved' ? `<button onclick="approve('${d.id}')">อนุมัติ</button>` : 'เรียบร้อย'}</td>
            </tr>`;
        });
    });

    window.approve = async (id) => {
        await updateDoc(doc(db, "comments", id), { status: "approved" });
    };

    // โหลดบทความแสดงผลด้านล่าง
    onSnapshot(collection(db, "articles"), (snap) => {
        const list = document.getElementById("articleList");
        list.innerHTML = "";
        snap.forEach(d => {
            const a = d.data();
            list.innerHTML += `<div style="padding:10px; border-bottom:1px solid #333;">
                <strong>${a.title}</strong> | หมวด: ${a.category} | ผู้แต่ง: ${a.author}
            </div>`;
        });
    });
</script>
</body>
</html>
