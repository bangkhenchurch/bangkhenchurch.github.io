<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin - BBC Church</title>
    <link rel="icon" type="image/png" href="logo.png">
    <link href="https://fonts.googleapis.com/css2?family=Sarabun:wght@300;400;700&family=Prompt:wght@400;600&display=swap" rel="stylesheet">
    <style>
        :root { --primary: #4dabff; --dark-bg: #121212; --card-bg: #1e1e1e; --accent: #0a2c6d; --danger: #ff4d4d; --success: #2ecc71; --warning: #f1c40f; }
        body { background: var(--dark-bg); color: #e0e0e0; font-family: 'Sarabun', sans-serif; padding: 20px; margin: 0; }
        .container { max-width: 1000px; margin: auto; }
        .form-card, .list-card { background: var(--card-bg); padding: 25px; border-radius: 15px; border-top: 4px solid var(--primary); margin-bottom: 30px; box-shadow: 0 4px 15px rgba(0,0,0,0.3); }
        h2, h3 { font-family: 'Prompt'; color: white; margin-top: 0; }
        label { display: block; margin-top: 15px; color: var(--primary); font-size: 14px; font-weight: 600; }
        input, textarea, select { width: 100%; padding: 12px; margin: 8px 0; background: #2a2a2a; border: 1px solid #444; color: white; border-radius: 8px; box-sizing: border-box; }
        .upload-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; margin-top: 10px; }
        .upload-box { width: 100%; height: 110px; background: #252525; border: 2px dashed #444; border-radius: 12px; cursor: pointer; position: relative; overflow: hidden; display: flex; align-items: center; justify-content: center; text-align: center; }
        .upload-box img { width: 100%; height: 100%; object-fit: cover; position: absolute; z-index: 2; }
        .upload-box span { font-size: 10px; color: #888; z-index: 1; }
        .btn-save { width: 100%; padding: 15px; background: var(--accent); color: white; border: none; border-radius: 8px; cursor: pointer; font-weight: bold; font-size: 16px; margin-top: 20px; transition: 0.3s; }
        .btn-save:hover { background: #1546a0; }
        .btn-action { padding: 6px 12px; border: none; border-radius: 5px; cursor: pointer; font-size: 12px; color: white; margin-right: 4px; font-weight: bold; }
        .btn-edit { background: var(--primary); }
        .btn-delete { background: var(--danger); }
        .btn-approve { background: var(--success); }
        table { width: 100%; border-collapse: collapse; margin-top: 15px; font-size: 14px; }
        th, td { padding: 12px; text-align: left; border-bottom: 1px solid #333; }
        th { color: var(--primary); background: rgba(255,255,255,0.05); }
        .status-badge { padding: 2px 6px; border-radius: 4px; font-size: 11px; font-weight: bold; }
        
        #loadingOverlay { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.9); z-index: 10000; flex-direction: column; justify-content: center; align-items: center; }
        .spinner { width: 50px; height: 50px; border: 5px solid #333; border-top: 5px solid var(--primary); border-radius: 50%; animation: spin 1s linear infinite; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
    </style>
</head>
<body>

<div id="loadingOverlay">
    <div class="spinner"></div>
    <div id="statusText" style="color: white; margin-top: 20px; font-family: 'Prompt';">ระบบกำลังประมวลผล...</div>
</div>

<div class="container">
    <div class="form-card">
        <h2 id="form-title">✍️ เขียนบทความใหม่ (Auto-Approve)</h2>
        <form id="postForm">
            <input type="hidden" id="editId">
            <label>หัวข้อเรื่อง</label>
            <input type="text" id="title" required placeholder="ใส่หัวข้อเรื่องที่นี่...">

            <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 15px;">
                <div><label>ผู้แต่ง/เทศนา</label><input type="text" id="author" placeholder="ชื่อผู้เขียน"></div>
                <div><label>วันที่</label><input type="date" id="customDate" required></div>
            </div>

            <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 15px;">
                <div><label>ซีรีส์</label><input type="text" id="series" placeholder="ชุดคำเทศนา"></div>
                <div><label>ข้อพระคัมภีร์</label><input type="text" id="scripture" placeholder="เช่น ปฐมกาล 1:1"></div>
            </div>

            <label>หมวดหมู่</label>
            <select id="category">
                <option value="📢 ข่าวสารคริสตจักร">📢 ข่าวสารคริสตจักร</option>
                <option value="📖 บทความทั่วไป">📖 บทความทั่วไป</option>
                <option value="🙏 คำพยานจากผู้เชื่อ">🙏 คำพยานจากผู้เชื่อ</option>
                <option value="🎙️ คำเทศนา (วิดีโอ)">🎙️ คำเทศนา (วิดีโอ)</option>
            </select>

            <label>รูปภาพ (แนะนำขนาดไม่เกิน 1MB ต่อรูป)</label>
            <div class="upload-grid">
                <div class="upload-box" onclick="document.getElementById('f1').click()" id="b1">
                    <span id="t1">รูปปก</span><input type="file" id="f1" hidden accept="image/*" onchange="preview(this, 'b1', 't1')">
                </div>
                <div class="upload-box" onclick="document.getElementById('f2').click()" id="b2">
                    <span id="t2">รูปหัวข้อ</span><input type="file" id="f2" hidden accept="image/*" onchange="preview(this, 'b2', 't2')">
                </div>
                <div class="upload-box" onclick="document.getElementById('f3').click()" id="b3">
                    <span id="t3">รูปเสริม</span><input type="file" id="f3" hidden accept="image/*" onchange="preview(this, 'b3', 't3')">
                </div>
            </div>

            <label>YouTube Link</label>
            <input type="text" id="youtubeUrl" placeholder="https://youtube.com/...">

            <label>เนื้อหาบทความ</label>
            <textarea id="content" rows="8" placeholder="พิมพ์เนื้อหาที่นี่..."></textarea>

            <button type="submit" id="saveBtn" class="btn-save">🚀 บันทึกและสแตนบายหน้าใหม่ทันที</button>
        </form>
    </div>

    <!-- ตารางบทความ -->
    <div class="list-card">
        <h3>📋 รายการบทความล่าสุด</h3>
        <table id="articleTable">
            <thead><tr><th>วันที่</th><th>หัวข้อ</th><th>จัดการ</th></tr></thead>
            <tbody></tbody>
        </table>
    </div>

    <!-- ตารางอนุมัติ Rating & Comment -->
    <div class="list-card" style="border-top-color: var(--success);">
        <h3>⭐ อนุมัติ Rating & Comments</h3>
        <table id="ratingTable">
            <thead>
                <tr><th>ผู้ส่ง</th><th>คะแนน/ข้อความ</th><th>จากเรื่อง</th><th>จัดการ</th></tr>
            </thead>
            <tbody></tbody>
        </table>
    </div>
</div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
    import { getFirestore, collection, addDoc, doc, updateDoc, deleteDoc, onSnapshot, query, orderBy, serverTimestamp, getDoc } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";
    import { getStorage, ref, uploadBytes, getDownloadURL } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-storage.js";

    const firebaseConfig = {
        apiKey: "AIzaSyDw9PPAcnoQUcVnHpcndJ5OpBcmYYnMq3",
        authDomain: "bbcchurch-6ffc3.firebaseapp.com",
        projectId: "bbcchurch-6ffc3",
        storageBucket: "bbcchurch-6ffc3.appspot.com",
        appId: "1:1007626508012:web:b936b62bf0ea69b31877c9"
    };

    const app = initializeApp(firebaseConfig);
    const db = getFirestore(app);
    const storage = getStorage(app);

    // ฟังก์ชันล้างฟอร์มสแตนบาย
    function clearToStandby() {
        document.getElementById('postForm').reset();
        document.getElementById('editId').value = "";
        document.getElementById('form-title').innerText = "✍️ เขียนบทความใหม่ (Auto-Approve)";
        document.getElementById('customDate').valueAsDate = new Date();
        
        // ล้างรูป Preview
        ['b1','b2','b3'].forEach(id => {
            const img = document.getElementById(id).querySelector('img');
            if(img) img.remove();
        });
        ['t1','t2','t3'].forEach(id => document.getElementById(id).style.display = 'block');
        
        window.scrollTo({top: 0, behavior: 'smooth'});
    }

    document.getElementById('customDate').valueAsDate = new Date();

    // บีบอัดภาพเพื่อป้องกันการค้าง
    async function compressImage(file) {
        return new Promise((resolve) => {
            const reader = new FileReader();
            reader.readAsDataURL(file);
            reader.onload = (e) => {
                const img = new Image();
                img.src = e.target.result;
                img.onload = () => {
                    const canvas = document.createElement('canvas');
                    let w = img.width, h = img.height;
                    const MAX = 800; // ลดขนาดเพื่อความเร็ว
                    if (w > h && w > MAX) { h *= MAX/w; w = MAX; }
                    else if (h > MAX) { w *= MAX/h; h = MAX; }
                    canvas.width = w; canvas.height = h;
                    const ctx = canvas.getContext('2d');
                    ctx.drawImage(img, 0, 0, w, h);
                    canvas.toBlob((blob) => resolve(blob), 'image/jpeg', 0.6);
                };
            };
        });
    }

    window.preview = (input, boxId, textId) => {
        const file = input.files[0];
        if (file) {
            const reader = new FileReader();
            reader.onload = (e) => {
                const box = document.getElementById(boxId);
                let img = box.querySelector('img') || document.createElement('img');
                img.src = e.target.result;
                box.appendChild(img);
                document.getElementById(textId).style.display = 'none';
            }
            reader.readAsDataURL(file);
        }
    };

    // บันทึกและสแตนบาย
    document.getElementById('postForm').onsubmit = async (e) => {
        e.preventDefault();
        const overlay = document.getElementById('loadingOverlay');
        overlay.style.display = 'flex';

        try {
            const fileConfigs = [
                { id: 'f1', folder: 'thumbs', key: 'thumbUrl' },
                { id: 'f2', folder: 'intros', key: 'introUrl' },
                { id: 'f3', folder: 'extras', key: 'contentUrl' }
            ];

            const uploadPromises = fileConfigs.map(async (config) => {
                const fileInput = document.getElementById(config.id);
                if (fileInput.files[0]) {
                    const compressed = await compressImage(fileInput.files[0]);
                    const sRef = ref(storage, `${config.folder}/${Date.now()}-${config.id}.jpg`);
                    const snap = await uploadBytes(sRef, compressed);
                    return { key: config.key, url: await getDownloadURL(snap.ref) };
                }
                return null;
            });

            const results = await Promise.all(uploadPromises);
            const data = {
                title: document.getElementById('title').value,
                author: document.getElementById('author').value,
                displayDate: document.getElementById('customDate').value,
                series: document.getElementById('series').value,
                scripture: document.getElementById('scripture').value,
                category: document.getElementById('category').value,
                youtubeUrl: document.getElementById('youtubeUrl').value,
                content: document.getElementById('content').value,
                status: 'approved',
                updatedAt: serverTimestamp()
            };

            results.forEach(res => { if (res) data[res.key] = res.url; });

            const editId = document.getElementById('editId').value;
            if (editId) {
                await updateDoc(doc(db, "articles", editId), data);
            } else {
                data.createdAt = serverTimestamp();
                await addDoc(collection(db, "articles"), data);
            }

            overlay.style.display = 'none'; // ปิด Overlay ทันที
            clearToStandby(); // ล้างฟอร์มสแตนบายหน้าใหม่
            alert("✅ บันทึกสำเร็จ! พร้อมลงเรื่องต่อไปได้เลย");

        } catch (err) {
            overlay.style.display = 'none';
            alert("❌ ผิดพลาด: " + err.message);
        }
    };

    // แสดงตารางข้อมูล (Real-time)
    onSnapshot(query(collection(db, "articles"), orderBy("displayDate", "desc")), (snap) => {
        const tbody = document.querySelector("#articleTable tbody");
        tbody.innerHTML = "";
        snap.forEach(d => {
            const r = d.data();
            tbody.innerHTML += `<tr>
                <td>${r.displayDate}</td>
                <td><b>${r.title}</b></td>
                <td>
                    <button class="btn-action btn-edit" onclick="loadEdit('${d.id}')">แก้ไข</button>
                    <button class="btn-action btn-delete" onclick="deleteArticle('${d.id}')">ลบ</button>
                </td>
            </tr>`;
        });
    });

    onSnapshot(query(collection(db, "ratings"), orderBy("createdAt", "desc")), (snap) => {
        const tbody = document.querySelector("#ratingTable tbody");
        tbody.innerHTML = "";
        snap.forEach(d => {
            const data = d.data();
            const status = data.approved ? '<span class="status-badge" style="background:var(--success)">อนุมัติแล้ว</span>' : '<span class="status-badge" style="background:var(--warning); color:black">รออนุมัติ</span>';
            tbody.innerHTML += `<tr>
                <td>${data.userName || 'ทั่วไป'}<br>${status}</td>
                <td>⭐ ${data.rating}/5 <br> ${data.comment}</td>
                <td><small>${data.articleTitle || '-'}</small></td>
                <td>
                    ${!data.approved ? `<button class="btn-action btn-approve" onclick="approveRating('${d.id}')">อนุมัติ</button>` : ''}
                    <button class="btn-action btn-delete" onclick="deleteRating('${d.id}')">ลบ</button>
                </td>
            </tr>`;
        });
    });

    // ฟังก์ชันจัดการปุ่มต่างๆ
    window.approveRating = async (id) => { await updateDoc(doc(db, "ratings", id), { approved: true }); };
    window.deleteRating = async (id) => { if(confirm("ลบข้อมูลนี้?")) await deleteDoc(doc(db, "ratings", id)); };
    window.deleteArticle = async (id) => { if(confirm("ลบบทความนี้?")) await deleteDoc(doc(db, "articles", id)); };
    window.loadEdit = async (id) => {
        const d = await getDoc(doc(db, "articles", id));
        const r = d.data();
        document.getElementById('editId').value = id;
        document.getElementById('title').value = r.title;
        document.getElementById('author').value = r.author || '';
        document.getElementById('customDate').value = r.displayDate;
        document.getElementById('series').value = r.series || '';
        document.getElementById('scripture').value = r.scripture || '';
        document.getElementById('category').value = r.category;
        document.getElementById('youtubeUrl').value = r.youtubeUrl || '';
        document.getElementById('content').value = r.content || '';
        document.getElementById('form-title').innerText = "📝 แก้ไข: " + r.title;
        window.scrollTo({top: 0, behavior: 'smooth'});
    };
</script>

</body>
</html>
