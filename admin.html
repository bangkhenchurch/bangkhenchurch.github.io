<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BBC Church - Admin Center</title>
    <link href="https://fonts.googleapis.com/css2?family=Sarabun:wght@300;400;700&family=Prompt:wght@400;600&display=swap" rel="stylesheet">
    <style>
        :root { --primary: #4dabff; --dark-bg: #121212; --card-bg: #1e1e1e; --success: #27ae60; --danger: #e67e22; }
        body { background: var(--dark-bg); color: #e0e0e0; font-family: 'Sarabun', sans-serif; padding: 20px; }
        .container { max-width: 900px; margin: auto; }
        .card { background: var(--card-bg); padding: 20px; border-radius: 12px; border-top: 4px solid var(--primary); margin-bottom: 20px; }
        h2 { color: #fff; font-size: 18px; margin-bottom: 15px; }
        label { display: block; font-size: 13px; color: var(--primary); margin: 10px 0 5px; }
        input, select, textarea { width: 100%; padding: 10px; background: #2a2a2a; border: 1px solid #444; color: #fff; border-radius: 6px; box-sizing: border-box; }
        .row { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
        .btn { padding: 12px; border: none; border-radius: 6px; cursor: pointer; font-weight: bold; }
        .btn-save { background: var(--success); color: white; width: 100%; margin-top: 20px; }
        table { width: 100%; border-collapse: collapse; margin-top: 10px; font-size: 13px; }
        th, td { border: 1px solid #444; padding: 10px; text-align: left; }
    </style>
</head>
<body>

<div class="container">
    <div class="card">
        <h2>✍️ แบบฟอร์ม บันทึกบทความ</h2>
        <form id="postForm">
            <div class="row">
                <div><label>1. วันที่</label><input type="date" id="date" required></div>
                <div><label>2. หมวดหมู่</label><select id="cat"><option>คำเทศนา</option><option>คำพยาน</option><option>บทความ</option><option>ข่าวสาร</option></select></div>
            </div>
            <label>3. หัวข้อเรื่อง</label><input type="text" id="title" required>
            <label>4. ซีรีย์</label><input type="text" id="series">
            <label>5. ผู้เทศนา / ผู้เขียน (เลือกหรือเพิ่ม)</label>
            <div style="display:flex; gap:5px;">
                <select id="authorList"></select>
                <button type="button" onclick="addAuthor()">+</button>
                <button type="button" onclick="delAuthor()">-</button>
            </div>
            <label>6. ข้อพระธรรม</label><input type="text" id="bible">
            <div class="row">
                <div><label>11. ลิ้งก์ยูทูบ 1</label><input type="text" id="yt1"></div>
                <div><label>12. ลิ้งก์ยูทูบ 2</label><input type="text" id="yt2"></div>
            </div>
            <label>13. ลิ้งก์เนื้อหา/เพลง (URL อิสระ)</label><input type="text" id="url">
            <label>14. เนื้อหา</label><textarea id="content" rows="4"></textarea>
            <label>15. หมายเหตุ</label><input type="text" id="note">
            <button type="submit" class="btn btn-save">บันทึกข้อมูลและแสดงผลทันที</button>
        </form>
    </div>

    <div class="card">
        <h2>⭐️ อนุมัติความคิดเห็นจากผู้ชม</h2>
        <table>
            <thead><tr><th>บทความ</th><th>ดาว</th><th>ความเห็น</th><th>สถานะ</th><th>จัดการ</th></tr></thead>
            <tbody id="commentBody"></tbody>
        </table>
    </div>
</div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
    import { getFirestore, collection, addDoc, onSnapshot, updateDoc, doc, deleteDoc } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

    const db = getFirestore(initializeApp({ /* ใส่ config ของคุณที่นี่ */ }));

    // จัดการชื่อผู้แต่ง
    window.addAuthor = () => {
        const name = prompt("ชื่อผู้เทศนา / ผู้เขียน:");
        if(name) addDoc(collection(db, "authors"), { name });
    };

    window.delAuthor = () => {
        const sel = document.getElementById("authorList");
        if(sel.options.length > 0) {
            // โค้ดสำหรับลบ ID ที่เลือก (ต้องดึง ID จาก data-id)
            alert("กรุณาเลือกชื่อที่ต้องการลบ");
        }
    };

    // บันทึกบทความ
    document.getElementById("postForm").onsubmit = async (e) => {
        e.preventDefault();
        await addDoc(collection(db, "articles"), {
            title: document.getElementById("title").value,
            date: document.getElementById("date").value,
            content: document.getElementById("content").value
        });
        alert("บันทึกและแสดงผลเรียบร้อย!");
    };

    // อนุมัติคอมเมนต์
    onSnapshot(collection(db, "comments"), (snap) => {
        const body = document.getElementById("commentBody");
        body.innerHTML = "";
        snap.forEach(d => {
            const c = d.data();
            body.innerHTML += `<tr>
                <td>${c.articleTitle}</td><td>${c.rating}</td><td>${c.text}</td>
                <td>${c.status || 'รออนุมัติ'}</td>
                <td><button onclick="updateDoc(doc(db,'comments','${d.id}'),{status:'approved'})">อนุมัติ</button></td>
            </tr>`;
        });
    });
</script>
</body>
</html>
