<!-- ปรับปรุงฟอร์มส่วนหัวข้อและช่องกรอกข้อมูล -->
<div class="form-grid">
    <div><label>1. วันที่</label><input type="date" id="customDate" required></div>
    <div>
        <label>2. หมวดหมู่</label>
        <select id="category">
            <option value="🎙️ คำเทศนา">🎙️ คำเทศนา</option>
            <option value="🌟 คำพยาน">🌟 คำพยาน</option>
            <option value="📖 บทความ">📖 บทความ</option>
            <option value="📢 ข่าวสาร">📢 ข่าวสาร</option>
        </select>
    </div>
    <div class="full-width"><label>3. หัวข้อเรื่อง</label><input type="text" id="title" required></div>
    <div><label>4. ซีรีย์</label><input type="text" id="series"></div>
    <div>
        <label>5. ผู้เขียน / ผู้เทศนา (เลือกหรือเพิ่มด้านขวา)</label>
        <div class="author-input-group">
            <select id="authorName"></select>
            <button type="button" class="btn-add-inline" id="btnAddAuthor" title="เพิ่มรายชื่อ">+</button>
            <button type="button" class="btn-delete-inline" id="btnDelAuthor" title="ลบรายชื่อ">🗑️</button>
        </div>
    </div>
    <div><label>6. ข้อพระธรรม (ระบุเลขข้อ)</label><input type="text" id="bibleRef" placeholder="เช่น ยอห์น 3:16"></div>
</div>

<!-- เพิ่มช่องลิงก์อิสระ -->
<div class="form-grid">
    <div><label>11. ลิ้งก์ยูทูบ 1</label><input type="text" id="yt1"></div>
    <div><label>12. ลิ้งก์ยูทูบ 2</label><input type="text" id="yt2"></div>
    <div class="full-width"><label>13. ลิ้งก์เนื้อหา/เพลง (URL อิสระ)</label><input type="text" id="extraLink" placeholder="https://..."></div>
</div>
